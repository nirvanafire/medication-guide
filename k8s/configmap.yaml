# ConfigMap - 应用配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: drug-qa-config
  namespace: drug-qa
data:
  ollama-url: "http://ollama-service:11434"
  spring-profiles-active: "prod"
  temperature: "0.1"
  top-k: "5"
  similarity-threshold: "0.6"
  mysql-host: "mysql-service"
  mysql-port: "3306"
  mysql-database: "medication_guide"
  redis-host: "redis-service"
  redis-port: "6379"
  milvus-uri: "milvus-service:19530"