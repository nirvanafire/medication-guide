# Milvus StatefulSet (向量数据库)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: milvus
  namespace: drug-qa
spec:
  serviceName: milvus-headless
  replicas: 1
  selector:
    matchLabels:
      app: milvus
  template:
    metadata:
      labels:
        app: milvus
    spec:
      containers:
      - name: milvus
        image: milvusdb/milvus:v2.4-latest
        ports:
        - containerPort: 19530
        env:
        - name: ETCD_ENDPOINTS
          value: "etcd:2379"
        - name: MINIO_ADDRESS
          value: "minio:9000"
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        volumeMounts:
        - name: milvus-data
          mountPath: /var/lib/milvus
  volumeClaimTemplates:
  - metadata:
      name: milvus-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 50Gi

---
# Milvus Service
apiVersion: v1
kind: Service
metadata:
  name: milvus-service
  namespace: drug-qa
spec:
  selector:
    app: milvus
  ports:
  - port: 19530
    targetPort: 19530

---
# Milvus Headless Service (for StatefulSet)
apiVersion: v1
kind: Service
metadata:
  name: milvus-headless
  namespace: drug-qa
spec:
  clusterIP: None
  selector:
    app: milvus
  ports:
  - port: 19530
    targetPort: 19530