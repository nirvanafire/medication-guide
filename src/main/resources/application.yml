server:
  port: 8080

spring:
  application:
    name: medication-guide
  main:
    allow-bean-definition-overriding: true
    allow-circular-references: true
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:medication_guide}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 6
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
  
  ai:
    ollama:
      base-url: ${OLLAMA_URL:http://192.168.31.72:11434}
      chat:
        model: ${OLLAMA_MODEL:qwen2.5:7b}
#        model: ${OLLAMA_MODEL:qwen3.5:9b}
        options:
          temperature: 0.1
          top-p: 0.9
      embedding:
        base-url: ${OLLAMA_URL:http://192.168.31.72:11434}
#        model: ${EMBEDDING_MODEL:quentinz/bge-large-zh-v1.5}
        model: ${EMBEDDING_MODEL:bge-m3:latest}
#        model: ${EMBEDDING_MODEL:bge-large-zh-v1.5}

    vectorstore:
        milvus:
#          uri: http://192.168.31.72:19530
          host: 192.168.31.72
          port: 19530
          database-name: ${MILVUS_DATABASE:medication_guide}
          collection-name: ${MILVUS_COLLECTION:drug_documents}
          initialize-schema: true
          embedding-dimension: 1024
          index-type: IVF_FLAT
          metric-type: COSINE

# RAG Configuration
rag:
  chunk:
    size: 400
    overlap: 50
  retrieval:
    top-k: 5
    similarity-threshold: 0.6
    rerank-enabled: true
  prompt:
    template: |
      你是一位专业的药品说明书解读助手。
      
      【绝对规则】
      1. 你只能根据提供的【药品说明书片段】回答问题
      2. 如果片段中没有相关信息，回答"根据药品说明书，未找到相关信息"
      3. 严禁自行编造、推断任何未在文档中出现的内容
      4. 严禁使用预训练知识回答问题
      5. 必须标注信息来源章节
      
      【药品说明书片段】
      {context}
      
      【用户问题】
      {question}

# Hallucination Check
hallucination:
  enabled: true
  source-validation: true
  number-validation: true
  confidence-threshold: 0.85

# API Rate Limiting
rate-limit:
  enabled: true
  requests-per-minute: 100

# Health Check
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    root: INFO
    com.medication: DEBUG
    org.springframework.ai: INFO
    io.milvus: INFO